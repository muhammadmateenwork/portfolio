<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#18181b;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Inner dark area -->
  <rect x="48" y="48" width="416" height="416" rx="72" ry="72" fill="url(#innerGrad)"/>
  <!-- Code bracket left < -->
  <path d="M180 160 L100 256 L180 352" stroke="#10b981" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Code bracket right > -->
  <path d="M332 160 L412 256 L332 352" stroke="#10b981" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Slash / -->
  <line x1="290" y1="130" x2="222" y2="382" stroke="#34d399" stroke-width="24" stroke-linecap="round"/>
</svg>
